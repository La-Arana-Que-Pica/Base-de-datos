<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Base de datos Option File PES 2018–2026</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ── Header ── -->
  <header id="header">
    <img
      class="logo"
      src="img/logo.png"
      onerror="this.onerror=null;this.src='img/logo.png'"
      alt="Logo"
    />
    <h1>
      Base de datos Option File <span>PES 2018–2026</span>
    </h1>
    <div id="search-container">
      <span class="search-icon">🔍</span>
      <input
        type="text"
        id="search-input"
        placeholder="Search players..."
        autocomplete="off"
      />
    </div>
  </header>

  <!-- ── Main layout ── -->
  <div id="layout">

    <!-- Sidebar -->
    <nav id="sidebar">
      <!-- Built dynamically by JS -->
    </nav>

    <!-- Content area -->
    <main id="main">

      <!-- Loading overlay -->
      <div id="loading-overlay">
        <div class="spinner"></div>
        <span class="loading-message">Loading database...</span>
      </div>

      <!-- Home view -->
      <div id="home-view">
        <div class="home-welcome">
          <h2>Welcome to the PES Option File Database</h2>
          <p>Select a team from the sidebar to browse players, or use the search bar above.</p>
        </div>
        <div class="stats-grid">
          <div class="stat-card">
            <div class="number" id="stat-leagues">0</div>
            <div class="label">Leagues</div>
          </div>
          <div class="stat-card">
            <div class="number" id="stat-teams">0</div>
            <div class="label">Teams</div>
          </div>
          <div class="stat-card">
            <div class="number" id="stat-players">0</div>
            <div class="label">Players</div>
          </div>
        </div>
      </div>

      <!-- Players list view -->
      <div id="players-view">
        <!-- Filled dynamically -->
      </div>

      <!-- Individual player profile view -->
      <div id="player-view">
        <!-- Filled dynamically -->
      </div>

      <!-- Search results view -->
      <div id="search-view">
        <!-- Filled dynamically -->
      </div>

    </main>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
