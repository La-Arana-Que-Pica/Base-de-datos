<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Base de datos Option File PES 2018-2026</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="img/logo.png" type="image/png" />
</head>
<body>

  <!-- ── Header ── -->
  <header id="header">
    <img
      class="logo"
      src="img/logo.png"
      onerror="this.onerror=null;this.src='img/logo.png'"
      alt="Logo"
      onclick="goHome()"
      style="cursor:pointer"
    />
    <h1>
      Base de datos Option File <span>PES 2018-2026</span>
    </h1>
    <div id="search-container">
      <span class="search-icon">🔍</span>
      <input
        type="text"
        id="search-input"
        placeholder="Buscar jugadores..."
        autocomplete="off"
      />
    </div>
  </header>

  <!-- ── Main layout ── -->
  <div id="layout">

    <!-- Sidebar -->
    <nav id="sidebar">
      <!-- Built dynamically by JS -->
    </nav>

    <!-- Content area -->
    <main id="main">

      <!-- Loading overlay -->
      <div id="loading-overlay">
        <div class="spinner"></div>
        <span class="loading-message">Cargando base de datos...</span>
      </div>

      <!-- Home view -->
      <div id="home-view">
        <div class="home-welcome">
          <h2>Bienvenido a la Base de datos Option File PES</h2>
          <p>Selecciona un equipo del menú lateral para explorar jugadores, o utiliza la barra de búsqueda.</p>
        </div>
        <div class="stats-grid">
          <div class="stat-card" onclick="showLeaguesView()">
            <div class="number" id="stat-leagues">0</div>
            <div class="label">Ligas</div>
          </div>
          <div class="stat-card" onclick="showTeamsView()">
            <div class="number" id="stat-teams">0</div>
            <div class="label">Equipos</div>
          </div>
          <div class="stat-card" onclick="showAllPlayers()">
            <div class="number" id="stat-players">0</div>
            <div class="label">Jugadores</div>
          </div>
        </div>
        <div id="home-leagues-section"></div>
      </div>

      <!-- Players list view -->
      <div id="players-view">
        <!-- Filled dynamically -->
      </div>

      <!-- Individual player profile view -->
      <div id="player-view">
        <!-- Filled dynamically -->
      </div>

      <!-- Search results view -->
      <div id="search-view">
        <!-- Filled dynamically -->
      </div>

      <!-- Leagues grid view -->
      <div id="leagues-view">
        <!-- Filled dynamically -->
      </div>

      <!-- Teams grid view -->
      <div id="teams-grid-view">
        <!-- Filled dynamically -->
      </div>

    </main>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
