<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Equipo – Base de datos PES</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="img/logo.png" type="image/png" />
</head>
<body>

  <!-- ── Header ── -->
  <header id="header">
    <a href="index.html" class="header-logo-link">
      <img
        class="logo"
        src="img/logo.png"
        onerror="this.onerror=null;this.src='img/logo.png'"
        alt="Logo"
      />
    </a>
    <h1>
      Base de datos Option File <span>PES 2018–2026</span>
    </h1>
  </header>

  <!-- ── Team page content ── -->
  <div id="team-page">

    <!-- Loading overlay -->
    <div id="loading-overlay">
      <div class="spinner"></div>
      <span class="loading-message">Cargando equipo...</span>
    </div>

    <!-- Team profile content (filled by team.js) -->
    <div id="team-content" style="display:none"></div>

  </div>

  <script src="js/team.js"></script>
</body>
</html>
