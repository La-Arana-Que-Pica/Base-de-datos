<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Liga – Base de datos PES</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="img/logo.png" type="image/webp" />
</head>
<body>

  <!-- ── Header ── -->
  <header id="header">
    <a href="index.html" class="header-logo-link">
      <img
        class="logo"
        src="img/logo.webp"
        onerror="this.onerror=null;this.src='img/logo.webp'"
        alt="Logo"
      />
    </a>
    <h1>
      Base de datos Option File <span>PES 2018–2026</span>
    </h1>
  </header>

  <!-- ── League page content ── -->
  <div id="league-page">

    <!-- Loading overlay -->
    <div id="loading-overlay">
      <div class="spinner"></div>
      <span class="loading-message">Cargando liga...</span>
    </div>

    <!-- League content (filled by league.js) -->
    <div id="league-content" style="display:none"></div>

  </div>

  <script src="js/league.js"></script>
</body>
</html>
